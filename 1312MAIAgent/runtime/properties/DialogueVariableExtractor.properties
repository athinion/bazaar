# DialogueVariableExtractor Configuration for 1312MAIAgent
# Calculates derived dialogue variables and categorizes them

# Frequency window (in seconds)
frequency_window_seconds=300

# Categorization thresholds
# Frequencies: High>=5, Medium=2-4, Low<2
frequency_threshold_high=5
frequency_threshold_medium=2

# TIME thresholds (seconds)
time_threshold_high=300
time_threshold_medium=120

# GINI thresholds (0-1, participation balance)
gini_threshold_high=0.5
gini_threshold_medium=0.25

# Logging
verbose_logging=false
